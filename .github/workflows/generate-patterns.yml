name: Generate and Validate Patterns

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-and-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        quickstart:
          - RAG
          - maas-code-assistant
          - product-recommender
          - lemonade-stand
          - llm-cpu-serving
          - data-governance

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install QuickPat
        run: pip install .

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Generate pattern
        run: |
          quickpat create "${{ matrix.quickstart }}" \
            --non-interactive \
            --output "/tmp/${{ matrix.quickstart }}-pattern"

      - name: Validate pattern
        id: validate
        run: |
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          quickpat validate "$PATTERN_DIR" --json > "$PATTERN_DIR/validation-report.json" || true
          quickpat validate "$PATTERN_DIR"

      - name: Helm lint (local charts)
        id: helm_lint
        run: |
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          STATUS="SKIP"
          for chart_dir in "$PATTERN_DIR"/charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            echo "Linting: $chart_dir"
            if helm lint "$chart_dir" 2>&1; then
              STATUS="PASS"
            else
              STATUS="FAIL"
            fi
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "$STATUS" > "$PATTERN_DIR/helm-lint-status.txt"

      - name: Helm template (secrets chart)
        run: |
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          FOUND=false
          for chart_dir in "$PATTERN_DIR"/charts/*-secrets/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            echo "Rendering: $chart_dir"
            helm template test "$chart_dir" \
              --set global.pattern="test" \
              --set global.namespace="default" 2>&1
            echo "$(basename "$chart_dir") chart renders OK"
            FOUND=true
          done
          if [ "$FOUND" = "false" ]; then
            echo "No secrets chart (local strategy) — skipping"
          fi

      - name: Helm template (upstream chart)
        run: |
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          INFRA_APPS="vault openshift-external-secrets golang-external-secrets dsc nfd nvidia-config"

          # Find the values-{group}.yaml file (prod or hub)
          VALUES_FILE=""
          for f in "$PATTERN_DIR"/values-prod.yaml "$PATTERN_DIR"/values-hub.yaml; do
            if [ -f "$f" ]; then VALUES_FILE="$f"; break; fi
          done
          if [ -z "$VALUES_FILE" ]; then
            echo "No values-prod.yaml or values-hub.yaml found — skipping"
            exit 0
          fi

          # Extract repoURL and path, skipping infra and secrets apps
          REPO_URL=$(python3 -c "
          import yaml
          with open('$VALUES_FILE') as f:
              data = yaml.safe_load(f)
          infra = set('$INFRA_APPS'.split())
          apps = data.get('clusterGroup', {}).get('applications', {})
          for name, app in apps.items():
              if name in infra or name.endswith('-secrets'):
                  continue
              url = app.get('repoURL', '')
              if url:
                  print(url)
                  break
          " 2>/dev/null || true)

          CHART_PATH=$(python3 -c "
          import yaml
          with open('$VALUES_FILE') as f:
              data = yaml.safe_load(f)
          infra = set('$INFRA_APPS'.split())
          apps = data.get('clusterGroup', {}).get('applications', {})
          for name, app in apps.items():
              if name in infra or name.endswith('-secrets'):
                  continue
              path = app.get('path', '.')
              if path:
                  print(path)
                  break
          " 2>/dev/null || true)

          if [ -n "$REPO_URL" ] && [ -n "$CHART_PATH" ]; then
            echo "Cloning upstream: $REPO_URL (path: $CHART_PATH)"
            git clone --depth 1 "$REPO_URL" /tmp/upstream-qs 2>&1 || true
            if [ -d "/tmp/upstream-qs/$CHART_PATH" ]; then
              helm template test "/tmp/upstream-qs/$CHART_PATH" 2>&1 || echo "WARN: upstream chart template failed (may need values)"
            else
              echo "WARN: chart path $CHART_PATH not found in upstream repo"
            fi
            rm -rf /tmp/upstream-qs
          else
            echo "No remote chart URL found — skipping upstream render"
          fi

      - name: Validate manifests (kubeconform)
        id: kubeconform
        run: |
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          STATUS="SKIP"
          for chart_dir in "$PATTERN_DIR"/charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            echo "Validating: $(basename "$chart_dir")"
            RENDERED=$(helm template test "$chart_dir" 2>/dev/null) || continue
            if echo "$RENDERED" | kubeconform -summary -strict -ignore-missing-schemas 2>&1; then
              [ "$STATUS" = "SKIP" ] && STATUS="PASS"
            else
              STATUS="FAIL"
            fi
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "$STATUS" > "$PATTERN_DIR/kubeconform-status.txt"

      - name: Upload generated pattern
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: "${{ matrix.quickstart }}-pattern"
          path: "/tmp/${{ matrix.quickstart }}-pattern"
          retention-days: 7

  validate-summary:
    needs: generate-and-validate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download all pattern artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: "*-pattern"
          path: /tmp/patterns

      - name: Generate validation summary
        run: |
          QUICKSTARTS="RAG maas-code-assistant product-recommender lemonade-stand llm-cpu-serving data-governance"

          # Build markdown table
          TABLE="| Quickstart | Status | Errors | Warnings | Helm Lint | Kubeconform |\n"
          TABLE+="|---|---|---|---|---|---|\n"

          TOTAL=0
          PASSED=0

          for QS in $QUICKSTARTS; do
            TOTAL=$((TOTAL + 1))
            REPORT="/tmp/patterns/${QS}-pattern/validation-report.json"
            HELM_STATUS="/tmp/patterns/${QS}-pattern/helm-lint-status.txt"
            KUBE_STATUS="/tmp/patterns/${QS}-pattern/kubeconform-status.txt"

            if [ -f "$REPORT" ]; then
              VALID=$(python3 -c "import json; d=json.load(open('$REPORT')); print('VALID' if d['valid'] else 'INVALID')" 2>/dev/null || echo "ERROR")
              ERRORS=$(python3 -c "import json; d=json.load(open('$REPORT')); print(sum(1 for i in d['issues'] if i['severity']=='error'))" 2>/dev/null || echo "?")
              WARNINGS=$(python3 -c "import json; d=json.load(open('$REPORT')); print(sum(1 for i in d['issues'] if i['severity']=='warning'))" 2>/dev/null || echo "?")
            else
              VALID="MISSING"
              ERRORS="?"
              WARNINGS="?"
            fi

            HELM=$(cat "$HELM_STATUS" 2>/dev/null || echo "N/A")
            KUBE=$(cat "$KUBE_STATUS" 2>/dev/null || echo "N/A")

            if [ "$VALID" = "VALID" ]; then
              STATUS_ICON="VALID"
              PASSED=$((PASSED + 1))
            else
              STATUS_ICON="INVALID"
            fi

            TABLE+="| $QS | $STATUS_ICON | $ERRORS | $WARNINGS | $HELM | $KUBE |\n"
          done

          # Write Job Summary
          echo "## Pattern Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$PASSED / $TOTAL patterns valid" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          printf "$TABLE" >> "$GITHUB_STEP_SUMMARY"

          # Save for PR comment
          {
            echo "## Pattern Validation Summary"
            echo ""
            echo "$PASSED / $TOTAL patterns valid"
            echo ""
            printf "$TABLE"
          } > /tmp/validation-comment.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_BODY=$(cat /tmp/validation-comment.md)
          MARKER="<!-- quickpat-validation-summary -->"

          REPO="${{ github.repository }}"
          PR="${{ github.event.pull_request.number }}"

          # Check for existing comment to update
          EXISTING=$(gh pr view "$PR" --repo "$REPO" \
            --json comments --jq '.comments[] | select(.body | contains("quickpat-validation-summary")) | .id' \
            2>/dev/null | head -1)

          BODY="${MARKER}
          ${COMMENT_BODY}"

          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
          fi

      - name: Upload combined validation reports
        uses: actions/upload-artifact@v6
        with:
          name: validation-reports
          path: /tmp/patterns/*/validation-report.json
          retention-days: 7

  publish-public:
    needs: generate-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        quickstart:
          - RAG
          - maas-code-assistant
          - product-recommender
          - lemonade-stand
          - llm-cpu-serving
          - data-governance

    steps:
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PATTERNS_DEPLOY_KEY }}

      - name: Download generated pattern
        uses: actions/download-artifact@v6
        with:
          name: "${{ matrix.quickstart }}-pattern"
          path: "/tmp/${{ matrix.quickstart }}-pattern"

      - name: Publish to public repo
        run: |
          BRANCH="${{ matrix.quickstart }}"
          PATTERN_DIR="/tmp/${{ matrix.quickstart }}-pattern"
          REPO_URL="git@github.com:atyronesmith/quickpat-patterns.git"

          git init /tmp/publish
          cd /tmp/publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "$REPO_URL"
          git checkout -b "$BRANCH"
          cp -r "$PATTERN_DIR"/. .
          git add -A
          git commit -m "Generated from ${{ matrix.quickstart }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push --force origin "$BRANCH"
